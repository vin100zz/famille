<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Une famille marseillaise</title>
  <link rel="stylesheet" href="src/ui/css/style.css?v=18">
  <link rel="stylesheet" href="src/ui/leaflet/leaflet.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <button id="home-btn" class="header-home-btn" onclick="goHome()" hidden title="Retour à l'accueil">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 13 15 13 15 21"/>
        </svg>
      </button>
      <span class="site-title">Une famille marseillaise</span>
      <button id="global-map-btn" class="header-map-btn" onclick="toggleGlobalMap()" title="Carte de tous les ancêtres">🌍</button>
      <div class="search-wrapper">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Rechercher un ancêtre (nom, prénom, numéro SOSA)"
          autocomplete="off"
          spellcheck="false"
          aria-label="Rechercher un ancêtre"
          aria-autocomplete="list"
          aria-controls="search-dropdown"
        >
        <div id="search-dropdown" class="search-dropdown" role="listbox" hidden></div>
      </div>
    </div>
  </header>

  <!-- Modal : création d'une nouvelle personne -->
  <div id="create-modal" class="create-modal" hidden role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
    <div class="create-modal__box">
      <div class="create-modal__header">
        <span id="create-modal-title" class="create-modal__title">Nouvelle personne</span>
        <button class="create-modal__close" type="button" onclick="closeCreatePerson()" aria-label="Fermer">✕</button>
      </div>
      <div class="create-modal__body">
        <div class="ed-field">
          <label class="ed-label" for="cp-nom">Nom</label>
          <input id="cp-nom" type="text" class="ed-input" placeholder="NOM (majuscules)">
        </div>
        <div class="ed-field">
          <label class="ed-label" for="cp-prenom">Prénom</label>
          <input id="cp-prenom" type="text" class="ed-input" placeholder="Prénom">
        </div>
        <div class="ed-field">
          <label class="ed-label">Sexe</label>
          <div class="ed-radio-group">
            <label class="ed-radio-label"><input type="radio" name="cp-sexe" value="M" checked> Homme</label>
            <label class="ed-radio-label"><input type="radio" name="cp-sexe" value="F"> Femme</label>
            <label class="ed-radio-label"><input type="radio" name="cp-sexe" value=""> ?</label>
          </div>
        </div>
        <div id="create-modal-error" class="create-modal__error" hidden></div>
      </div>
      <div class="create-modal__footer">
        <button id="create-modal-submit" class="ed-btn ed-btn--save" type="button" onclick="submitCreatePerson()">Créer</button>
        <button class="ed-btn ed-btn--cancel" type="button" onclick="closeCreatePerson()">Annuler</button>
      </div>
    </div>
  </div>

  <main class="main-content" id="main-content">
    <div id="person-view"></div>
  </main>

  <!-- Arbre circulaire (plein écran, affiché à l'accueil) -->
  <div id="welcome" class="welcome-screen">
    <div id="tree-scroll-area" class="tree-scroll-area">
      <div id="tree-container" class="tree-container"></div>
    </div>
  </div>

  <!-- Carte globale (plein écran) -->
  <div id="global-map-screen" class="global-map-screen" hidden></div>

  <!-- Tooltip arbre -->
  <div id="ct-tooltip" class="ct-tooltip"></div>

  <!-- Lightbox plein écran -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image en plein écran">
    <img id="lightbox-img" class="lightbox__img" src="" alt="">
    <button id="lightbox-close" class="lightbox__close" aria-label="Fermer">✕</button>
  </div>

  <script src="src/ui/leaflet/leaflet.js"></script>
  <script src="src/ui/js/api.js?v=4"></script>
  <script src="src/ui/js/components.js?v=9"></script>
  <script src="src/ui/js/editor.js?v=6"></script>
  <script src="src/ui/js/circular-tree.js?v=2"></script>
  <script src="src/ui/js/map-view.js?v=12"></script>
  <script src="src/ui/js/global-map.js?v=1"></script>
  <script src="src/ui/js/app.js?v=8"></script>
</body>
</html>
